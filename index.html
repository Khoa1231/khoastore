<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHOANGO Steam+ | Nền tảng Game Đẳng Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #070d14;
            --card-bg: rgba(15, 23, 42, 0.6);
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            color: #e2e8f0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Glassmorphism cực mạnh */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Hiệu ứng trượt trang chuyên nghiệp */
        .page-transition {
            animation: pageSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pageSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Hiệu ứng nút bấm chuyên nghiệp */
        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:active { transform: scale(0.95); }
        .btn-premium::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }
        .btn-premium:hover::after { left: 120%; }

        /* Game Card Hover */
        .game-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px -15px var(--accent-glow);
        }

        /* Toast Animation */
        .toast-in {
            animation: toastIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes toastIn {
            from { transform: translateY(100%) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .active-nav-dot {
            width: 4px; height: 4px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 8px var(--accent);
        }

        /* Hide elements based on device */
        .pc-only { display: none; }
        .mobile-only { display: none; }
        body.pc-mode .pc-only { display: block; }
        body.mobile-mode .mobile-only { display: block; }
    </style>
</head>
<body class="min-h-screen">

    <!-- SELECTOR MÀN HÌNH CHÀO MỪNG -->
    <div id="device-selector" class="fixed inset-0 z-[1000] bg-[#070d14] flex flex-col items-center justify-center p-6 overflow-hidden">
        <div class="absolute inset-0 opacity-20 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full blur-[120px]"></div>
        </div>

        <div class="relative z-10 mb-16 text-center">
            <div class="w-24 h-24 bg-blue-600 rounded-[32px] flex items-center justify-center shadow-2xl shadow-blue-500/40 mx-auto mb-8 animate-bounce">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-5xl font-black italic text-white tracking-tighter mb-2">KHOANGO <span class="text-blue-500">STEAM+</span></h1>
            <div class="h-1 w-20 bg-blue-600 mx-auto rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-3xl px-4">
            <button onclick="initApp('pc')" class="glass p-12 rounded-[48px] transition-all group btn-premium text-center border-white/5 hover:border-blue-500/30">
                <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-600 group-hover:shadow-lg group-hover:shadow-blue-500/50 transition-all duration-500">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <h3 class="text-2xl font-black text-white uppercase italic tracking-tight">Desktop Mode</h3>
                <p class="text-[10px] text-gray-500 mt-3 font-bold uppercase tracking-[0.2em]">Trải nghiệm toàn màn hình</p>
            </button>

            <button onclick="initApp('mobile')" class="glass p-12 rounded-[48px] transition-all group btn-premium text-center border-white/5 hover:border-blue-500/30">
                <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-600 group-hover:shadow-lg group-hover:shadow-blue-500/50 transition-all duration-500">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                </div>
                <h3 class="text-2xl font-black text-white uppercase italic tracking-tight">Mobile Experience</h3>
                <p class="text-[10px] text-gray-500 mt-3 font-bold uppercase tracking-[0.2em]">Tối ưu hóa thao tác chạm</p>
            </button>
        </div>
    </div>

    <!-- MAIN APP UI -->
    <div id="app-ui" class="hidden opacity-0 transition-opacity duration-1000">
        <!-- HEADER -->
        <header class="sticky top-0 z-[100] glass border-b border-white/5 px-6 md:px-12 py-5">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-12">
                    <div onclick="showView('store')" class="flex items-center gap-3 cursor-pointer group">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center group-hover:rotate-12 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                        <span class="text-2xl font-black italic text-white tracking-tighter">KHOANGO</span>
                    </div>
                    
                    <nav class="hidden md:flex gap-10">
                        <button onclick="showView('store')" id="nav-store" class="nav-link relative text-[11px] font-black uppercase tracking-[0.2em] transition-colors">
                            Cửa hàng
                            <div id="dot-store" class="active-nav-dot absolute -bottom-2 left-1/2 -translate-x-1/2 hidden"></div>
                        </button>
                        <button onclick="showView('library')" id="nav-library" class="nav-link relative text-[11px] font-black uppercase tracking-[0.2em] transition-colors">
                            Thư viện
                            <div id="dot-library" class="active-nav-dot absolute -bottom-2 left-1/2 -translate-x-1/2 hidden"></div>
                        </button>
                    </nav>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="hidden sm:flex flex-col items-end">
                        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Số dư ví</span>
                        <span id="user-balance" class="text-sm font-black text-blue-400">0đ</span>
                    </div>
                    <div onclick="showView('profile')" class="w-11 h-11 rounded-2xl border-2 border-white/10 p-0.5 hover:border-blue-500 transition-colors cursor-pointer">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=KHOANGO" class="w-full h-full rounded-[14px] bg-slate-800" alt="Ava">
                    </div>
                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <main id="main-content" class="max-w-7xl mx-auto px-6 md:px-12 py-8 md:py-16">
            <!-- Render Dynamic Content -->
        </main>

        <!-- MOBILE BOTTOM NAV -->
        <div id="mobile-nav" class="fixed bottom-0 left-0 right-0 z-[100] glass border-t border-white/10 px-8 py-5 flex justify-around items-center md:hidden">
            <button onclick="showView('store')" class="p-2 transition-all active:scale-75">
                <svg id="m-nav-store" class="w-7 h-7 text-gray-500 transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            </button>
            <button onclick="showView('library')" class="p-2 transition-all active:scale-75">
                <svg id="m-nav-library" class="w-7 h-7 text-gray-500 transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
            </button>
            <button onclick="showView('profile')" class="p-2 transition-all active:scale-75">
                <svg id="m-nav-profile" class="w-7 h-7 text-gray-500 transition-colors" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
    </div>

    <!-- PREMIUM MODAL -->
    <div id="payment-modal" class="hidden fixed inset-0 z-[1000] bg-black/80 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[48px] p-10 shadow-2xl border-t-4 border-blue-600 transition-transform duration-500 scale-90" id="modal-container">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h3 class="text-3xl font-black text-white uppercase italic tracking-tight">Xác nhận</h3>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mt-1">Giao dịch an toàn 256-bit</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div id="modal-info" class="bg-white/5 rounded-[32px] p-6 flex gap-6 items-center mb-10"></div>
            
            <div class="flex justify-between items-end mb-10 px-2">
                <div>
                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1">Tổng chi phí</p>
                    <p id="modal-total" class="text-4xl font-black text-blue-500 italic tracking-tighter"></p>
                </div>
                <p class="text-[9px] font-bold text-green-500 uppercase tracking-widest mb-2">VAT Included</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button id="confirm-btn" class="w-full py-6 bg-blue-600 text-white font-black uppercase text-xs tracking-[0.3em] rounded-[24px] shadow-2xl shadow-blue-600/40 btn-premium">Thanh toán ngay</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="fixed bottom-24 md:bottom-12 right-6 left-6 md:left-auto md:right-12 z-[2000] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const GAMES = [
            { id: 'g1', title: 'TrọngBlack-Wukỏng', price: 1290000, img: 'nengame1.jpg', tags: ['Action', 'RPG'], url: 'wukong.html' },
            { id: 'g2', title: 'DinoGORILLA', price: 990000, img: 'gr.jpg', tags: ['Survival'], url: 'dino.html' },
            { id: 'g3', title: 'Tiến Lên Miền Tây', price: 0, img: 'tl.jpg', tags: ['Card', 'Free'], url: 'bai.html' },
            { id: 'g4', title: 'BÍ KIẾP LUYỆN CÁ', price: 150000, img: 'cc.jpg', tags: ['Board'], url: 'cauca.html' },
            { id: 'g5', title: 'NhaccuaTAO', subtitle: 'ZingMP4 Premium', price: 88000, img: 'khoa.jpg', tags: ['Music'], url: 'nhac.html' }
        ];

        const CODES = { 'KHOANGO': 5000000 };

        let state = {
            device: null,
            balance: 0,
            ownedIds: [],
            keys: [],
            currentView: 'store'
        };

        function initApp(type) {
            state.device = type;
            document.body.classList.add(type + '-mode');
            
            const selector = document.getElementById('device-selector');
            selector.classList.add('transition-all', 'duration-700', 'opacity-0', 'scale-110');
            
            setTimeout(() => {
                selector.style.display = 'none';
                const app = document.getElementById('app-ui');
                app.classList.remove('hidden');
                setTimeout(() => app.classList.replace('opacity-0', 'opacity-100'), 50);
                showView('store');
                updateBalanceUI();
            }, 700);
        }

        function showView(view) {
            state.currentView = view;
            const content = document.getElementById('main-content');
            
            // Effect: Fade out then fade in content
            content.classList.remove('page-transition');
            void content.offsetWidth; // Trigger reflow
            content.classList.add('page-transition');

            // Update Nav UI (PC)
            document.querySelectorAll('.nav-link').forEach(btn => {
                const isMatch = btn.id === `nav-${view}`;
                btn.classList.toggle('text-blue-500', isMatch);
                btn.classList.toggle('text-gray-400', !isMatch);
                const dot = document.getElementById(`dot-${btn.id.split('-')[1]}`);
                if(dot) dot.classList.toggle('hidden', !isMatch);
            });

            // Update Nav UI (Mobile)
            ['store', 'library', 'profile'].forEach(v => {
                const icon = document.getElementById(`m-nav-${v}`);
                if(icon) icon.classList.toggle('text-blue-500', v === view);
                if(icon) icon.classList.toggle('text-gray-500', v !== view);
            });

            if (view === 'store') renderStore(content);
            else if (view === 'library') renderLibrary(content);
            else if (view === 'profile') renderProfile(content);

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderStore(el) {
            const isMob = state.device === 'mobile';
            el.innerHTML = `
                <div class="relative ${isMob ? 'h-[300px]' : 'h-[480px]'} rounded-[48px] overflow-hidden mb-12 group cursor-pointer shadow-2xl">
                    <img src="${GAMES[0].img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#070d14] via-transparent to-transparent"></div>
                    <div class="absolute bottom-10 left-10 right-10">
                        <span class="inline-block px-3 py-1 bg-blue-600 rounded-lg text-[8px] font-black uppercase tracking-widest text-white mb-4">Trending Now</span>
                        <h2 class="${isMob ? 'text-3xl' : 'text-6xl'} font-black italic text-white uppercase mb-6 tracking-tight">${GAMES[0].title}</h2>
                        <button onclick="openBuyModal('${GAMES[0].id}')" class="bg-white text-black px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-blue-600 hover:text-white transition-all btn-premium">Sở hữu ngay</button>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xs font-black text-white uppercase italic tracking-[0.3em]">Bộ sưu tập mới</h3>
                    <div class="h-[1px] flex-1 bg-white/5 mx-6"></div>
                </div>

                <div class="grid ${isMob ? 'grid-cols-1' : 'grid-cols-2 lg:grid-cols-4'} gap-8">
                    ${GAMES.map(g => `
                        <div class="game-card glass rounded-[40px] p-2.5 border border-white/5 group cursor-pointer" onclick="openBuyModal('${g.id}')">
                            <div class="aspect-[4/5] rounded-[32px] overflow-hidden relative">
                                <img src="${g.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10">
                                    <span class="text-[10px] font-black text-blue-400">${g.price === 0 ? 'MIỄN PHÍ' : g.price.toLocaleString() + 'đ'}</span>
                                </div>
                            </div>
                            <div class="p-6">
                                <h4 class="text-white font-black text-md uppercase truncate italic tracking-tight">${g.title}</h4>
                                <div class="flex gap-2 mt-2">
                                    ${g.tags.map(t => `<span class="text-[7px] font-bold text-gray-500 uppercase border border-white/5 px-2 py-0.5 rounded-md">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderLibrary(el) {
            const myGames = GAMES.filter(g => state.ownedIds.includes(g.id));
            el.innerHTML = `
                <div class="mb-12">
                    <h2 class="text-4xl font-black text-white uppercase italic tracking-tighter mb-2">Thư viện</h2>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic">Bạn đang sở hữu ${myGames.length} sản phẩm</p>
                </div>
                ${myGames.length > 0 ? `
                    <div class="grid ${state.device === 'mobile' ? 'grid-cols-1' : 'grid-cols-2 lg:grid-cols-3'} gap-8">
                        ${myGames.map(g => `
                            <div class="glass rounded-[40px] p-6 flex gap-6 items-center hover:border-blue-500/50 transition-colors">
                                <img src="${g.img}" class="w-24 h-24 rounded-[24px] object-cover shadow-lg">
                                <div class="flex-1 overflow-hidden">
                                    <h4 class="text-lg font-black text-white uppercase italic truncate">${g.title}</h4>
                                    <p class="text-[8px] text-blue-500 font-bold uppercase tracking-widest mt-1 mb-4">Digital License</p>
                                    <button onclick="playGame('${g.url}')" class="w-full py-3 bg-white/5 border border-white/10 rounded-xl text-[9px] font-black uppercase tracking-widest text-white hover:bg-blue-600 hover:border-blue-600 transition-all active:scale-95">Khởi động</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : `
                    <div class="glass rounded-[48px] py-32 text-center border-dashed border-2 border-white/5">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 opacity-20">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                        </div>
                        <p class="text-gray-500 font-black uppercase italic tracking-widest text-xs">Chưa có gì ở đây cả</p>
                        <button onclick="showView('store')" class="mt-6 text-blue-500 text-[10px] font-black uppercase tracking-widest hover:underline">Đi mua sắm ngay</button>
                    </div>
                `}
            `;
        }

        function renderProfile(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-1">
                        <div class="glass p-10 rounded-[48px] text-center sticky top-32">
                            <div class="relative w-32 h-32 mx-auto mb-6">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=KHOANGO" class="w-full h-full rounded-[40px] bg-slate-800 border-4 border-blue-600 p-1 shadow-2xl">
                                <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-green-500 border-4 border-[#070d14] rounded-full"></div>
                            </div>
                            <h3 class="text-2xl font-black text-white italic tracking-tight">KHOANGO_USER</h3>
                            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-[0.3em] mt-1">Diamond Member</p>
                            
                            <div class="mt-10 pt-10 border-t border-white/5 space-y-4">
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-[10px] font-bold text-gray-500 uppercase">Số dư</span>
                                    <span class="text-md font-black text-green-400">${state.balance.toLocaleString()}đ</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-8">
                        <div class="glass p-10 rounded-[48px]">
                            <h4 class="text-sm font-black text-white uppercase mb-8 italic tracking-widest">Nạp tiền hệ thống</h4>
                            <div class="relative group">
                                <input id="code-input" type="text" placeholder="NHẬP MÃ GIFTCODE..." class="w-full bg-black/40 border-2 border-white/5 rounded-[24px] py-6 px-8 text-white font-black text-xl focus:border-blue-600 transition-all outline-none uppercase placeholder:text-gray-700">
                                <button onclick="redeemCode()" class="absolute right-3 top-3 bottom-3 px-8 bg-white text-black font-black rounded-2xl uppercase text-[10px] tracking-widest hover:bg-blue-600 hover:text-white transition-all btn-premium">Xác nhận</button>
                            </div>
                            <p class="mt-6 text-[9px] text-gray-500 font-bold uppercase tracking-widest text-center italic">Sử dụng mã độc quyền <span class="text-blue-500">KHOANGO</span> để nhận 5,000,000đ</p>
                        </div>

                        <div class="glass p-10 rounded-[48px]">
                            <h4 class="text-sm font-black text-white uppercase mb-8 italic tracking-widest">Kích hoạt bản quyền</h4>
                            <div class="flex flex-col sm:flex-row gap-4">
                                <input id="key-input" type="text" placeholder="XXXX-XXXX-XXXX" class="flex-1 bg-black/40 border-2 border-white/5 rounded-[24px] py-6 px-8 text-blue-400 font-black text-xl focus:border-blue-600 outline-none uppercase font-mono placeholder:text-gray-800">
                                <button onclick="activateKey()" class="px-12 py-6 bg-blue-600 text-white font-black rounded-[24px] uppercase text-[10px] tracking-widest btn-premium shadow-xl shadow-blue-600/20">Active Key</button>
                            </div>
                            
                            <div class="mt-12">
                                <div class="flex items-center gap-4 mb-6">
                                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Lịch sử giao dịch</p>
                                    <div class="h-[1px] flex-1 bg-white/5"></div>
                                </div>
                                <div class="space-y-3">
                                    ${state.keys.length > 0 ? state.keys.map(k => `
                                        <div class="flex justify-between items-center bg-white/5 p-5 rounded-[24px] group hover:bg-white/10 transition-colors">
                                            <div>
                                                <p class="text-[10px] font-black text-white uppercase italic tracking-tight">${k.gameTitle}</p>
                                                <p class="text-[8px] font-mono text-gray-500 mt-1 uppercase tracking-widest">${k.key}</p>
                                            </div>
                                            <button onclick="copyText('${k.key}')" class="px-4 py-2 bg-blue-600/10 text-blue-500 rounded-xl text-[8px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Copy</button>
                                        </div>
                                    `).join('') : '<p class="text-center py-10 opacity-20 italic text-xs uppercase tracking-widest">Trống</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Logic Functions
        function openBuyModal(gameId) {
            if (state.ownedIds.includes(gameId)) return toast("Sản phẩm đã có trong thư viện!", "info");
            const game = GAMES.find(g => g.id === gameId);
            const modal = document.getElementById('payment-modal');
            const container = document.getElementById('modal-container');
            
            document.getElementById('modal-info').innerHTML = `
                <img src="${game.img}" class="w-24 h-24 rounded-[24px] object-cover shadow-2xl">
                <div class="overflow-hidden">
                    <p class="text-2xl font-black text-white uppercase italic truncate tracking-tight">${game.title}</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">KHOANGO+ Official Store</p>
                </div>
            `;
            document.getElementById('modal-total').innerText = game.price.toLocaleString() + 'đ';
            document.getElementById('confirm-btn').onclick = () => processPurchase(game);
            
            modal.classList.remove('hidden');
            setTimeout(() => container.classList.replace('scale-90', 'scale-100'), 10);
        }

        function closeModal() { 
            const container = document.getElementById('modal-container');
            container.classList.replace('scale-100', 'scale-90');
            setTimeout(() => document.getElementById('payment-modal').classList.add('hidden'), 300);
        }

        function processPurchase(game) {
            if (state.balance < game.price) return toast("Số dư không đủ. Vui lòng nạp thêm!", "error");
            
            const btn = document.getElementById('confirm-btn');
            btn.innerText = "ĐANG XỬ LÝ...";
            btn.disabled = true;

            setTimeout(() => {
                const key = `KNG-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
                state.balance -= game.price;
                state.keys.unshift({ gameId: game.id, gameTitle: game.title, key: key });
                closeModal();
                updateBalanceUI();
                toast("Đã mua thành công! Hãy kích hoạt Key trong hồ sơ.");
                btn.innerText = "Thanh toán ngay";
                btn.disabled = false;
                showView('profile');
            }, 1200);
        }

        function redeemCode() {
            const val = document.getElementById('code-input').value.trim().toUpperCase();
            if (CODES[val]) {
                state.balance += CODES[val];
                toast(`Đã cộng ${CODES[val].toLocaleString()}đ vào ví!`);
                delete CODES[val];
                updateBalanceUI();
                renderProfile(document.getElementById('main-content'));
            } else { 
                toast("Mã quà tặng không hợp lệ hoặc đã hết hạn.", "error"); 
            }
        }

        function activateKey() {
            const val = document.getElementById('key-input').value.trim().toUpperCase();
            const recordIdx = state.keys.findIndex(k => k.key === val);
            if (recordIdx > -1) {
                const record = state.keys[recordIdx];
                if (state.ownedIds.includes(record.gameId)) return toast("Bạn đã sở hữu game này.");
                state.ownedIds.push(record.gameId);
                toast(`Kích hoạt thành công: ${record.gameTitle}!`);
                document.getElementById('key-input').value = '';
                renderProfile(document.getElementById('main-content'));
            } else { 
                toast("Key kích hoạt không tồn tại trên hệ thống.", "error"); 
            }
        }

        function playGame(url) {
            toast("Đang tải tài nguyên...");
            setTimeout(() => { 
                if (url === '#') toast("Server game đang bảo trì!", "error"); 
                else window.open(url, '_blank'); 
            }, 1500);
        }

        function updateBalanceUI() {
            const bal = document.getElementById('user-balance');
            bal.classList.add('scale-110');
            bal.innerText = state.balance.toLocaleString() + 'đ';
            setTimeout(() => bal.classList.remove('scale-110'), 200);
        }

        function toast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            const isError = type === 'error';
            
            div.className = `glass px-8 py-4 rounded-[20px] shadow-2xl flex items-center gap-4 toast-in border-l-4 ${isError ? 'border-red-500' : 'border-blue-500'}`;
            div.innerHTML = `
                <div class="w-2 h-2 rounded-full ${isError ? 'bg-red-500 animate-pulse' : 'bg-blue-500 animate-pulse'}"></div>
                <p class="text-[10px] font-black text-white uppercase tracking-widest">${msg}</p>
            `;
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transform = 'translateY(10px)';
                setTimeout(() => div.remove(), 500);
            }, 3500);
        }

        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            toast("Đã sao chép vào bộ nhớ tạm!");
        }
    </script>
</body>
</html>
