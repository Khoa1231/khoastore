<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHOA - KHANG - LỢI | Dino Ultra Warrior</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #0f172a;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 1s ease;
        }
        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }
        #gameCanvas {
            border: 4px solid #334155;
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            background: linear-gradient(to bottom, #1e293b 0%, #0f172a 100%);
        }
        .ui-panel {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #475569;
        }
        #rage-container {
            width: 200px;
            height: 15px;
            background: #334155;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        #rage-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #facc15, #f97316);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4" id="gameBody">

    <div class="text-center mb-4">
        <h1 class="pixel-font text-2xl md:text-3xl text-yellow-400 mb-2" style="text-shadow: 3px 3px #be185d;">KHOA - KHANG - LỢI</h1>
        <div class="flex items-center justify-center gap-4">
            <p class="text-blue-400 pixel-font text-[10px]">ULTRA DINO - GORILA SẤM SÉT</p>
            <div id="rage-container">
                <div id="rage-fill"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[8px] pixel-font text-white uppercase">Nộ</div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-[800px] flex justify-between items-center mb-2 px-4 ui-panel p-3 rounded-t-lg">
        <div id="score" class="pixel-font text-sm text-green-400">ĐIỂM: 0000</div>
        <div id="active-item" class="pixel-font text-[9px] text-yellow-500">TRẠNG THÁI: THƯỜNG</div>
        <div id="high-score" class="pixel-font text-sm text-gray-400">BEST: 0000</div>
    </div>

    <canvas id="gameCanvas" width="800" height="300"></canvas>

    <div class="mt-4 grid grid-cols-3 gap-4 max-w-2xl w-full text-center">
        <div class="ui-panel p-2 rounded-lg">
            <span class="block text-yellow-400 font-bold text-xs mb-1">CÁCH / CLICK</span>
            <span class="text-[10px]">NHẢY</span>
        </div>
        <div class="ui-panel p-2 rounded-lg">
            <span class="block text-purple-400 font-bold text-xs mb-1">PHÍM V</span>
            <span class="text-[10px]">KÍCH NỘ (GORILA)</span>
        </div>
        <div class="ui-panel p-2 rounded-lg">
            <span class="block text-red-400 font-bold text-xs mb-1">PHÍM F</span>
            <span class="text-[10px]">PHUN LỬA</span>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden flex-col items-center justify-center z-50">
        <h2 class="pixel-font text-4xl text-red-600 mb-4">THẤT BẠI!</h2>
        <p id="final-score" class="pixel-font text-xl mb-8 text-white">ĐIỂM: 0</p>
        <button onclick="resetGame()" class="pixel-font bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-lg transition-transform hover:scale-110">CHƠI LẠI</button>
        <p class="mt-6 text-gray-500 italic text-center text-sm">"Cô ơi cố lên! Khoa Khang Lợi luôn bên cô!"</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const itemEl = document.getElementById('active-item');
        const rageFill = document.getElementById('rage-fill');
        const modal = document.getElementById('modal');

        const GRAVITY = 0.5;
        const GROUND_Y = 250;
        const DINO_X = 80;

        let score = 0, highScore = 0, isGameOver = false, gameSpeed = 3.5, frameCount = 0;
        let particles = [], obstacles = [], items = [], projectiles = [];
        let lastObstacleX = 0;
        let ragePercent = 0;

        let dino = {
            y: GROUND_Y, vy: 0, width: 44, height: 44, isJumping: false,
            mode: 'normal', 
            timer: 0,
            fireCount: 0,
            scale: 1,
            fearTextY: 0, // Vị trí chữ bay trên đầu
            fearAlpha: 0  // Độ mờ của chữ
        };

        function init() {
            score = 0; gameSpeed = 3.5; frameCount = 0; lastObstacleX = 0; ragePercent = 0;
            obstacles = []; items = []; projectiles = []; particles = [];
            dino = { y: GROUND_Y, vy: 0, width: 44, height: 44, isJumping: false, mode: 'normal', timer: 0, fireCount: 0, scale: 1, fearTextY: 0, fearAlpha: 0 };
            isGameOver = false;
            modal.style.display = 'none';
            requestAnimationFrame(update);
        }

        function handleJump() {
            if (isGameOver) return;
            if (!dino.isJumping) {
                dino.vy = dino.mode === 'giant' || dino.mode === 'gorilla' ? -10 : -12;
                dino.isJumping = true;
            }
        }

        function activateGorilla() {
            if (ragePercent >= 100 && dino.mode === 'normal') {
                dino.mode = 'gorilla';
                dino.timer = 180;
                dino.scale = 2.2;
                ragePercent = 0;
                createParticles(DINO_X, dino.y, '#facc15', 30);
            }
        }

        function handleAction() {
            if (isGameOver) return;
            if (dino.mode === 'giant' && dino.fireCount > 0) {
                projectiles.push({ x: DINO_X + 60, y: dino.y + 20, vx: 10, type: 'fire', size: 40 });
                dino.fireCount--;
            }
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space') { handleJump(); e.preventDefault(); }
            if (e.code === 'KeyF') handleAction();
            if (e.code === 'KeyV') activateGorilla();
        });

        canvas.addEventListener('mousedown', e => {
            if (e.clientX > window.innerWidth / 2) handleAction();
            else handleJump();
        });

        function spawnObstacle() {
            let displayScore = Math.floor(score/10);
            let minGap = 450; 
            if (canvas.width - lastObstacleX > minGap) {
                let spawnChance = displayScore < 1000 ? 0.005 : 0.012;
                if (Math.random() < spawnChance) {
                    let type = 'cactus';
                    if (displayScore > 700 && Math.random() < 0.2) type = 'car';
                    let obs = {
                        x: canvas.width,
                        y: GROUND_Y,
                        w: type === 'car' ? 60 : 30,
                        h: type === 'car' ? 35 : 45,
                        type: type,
                        vx: type === 'car' ? gameSpeed * 1.4 : gameSpeed,
                        isScared: false
                    };
                    obstacles.push(obs);
                    lastObstacleX = obs.x;
                }
            }
        }

        function spawnItem() {
            if (frameCount % 900 === 0) {
                const types = [
                    { id: 'giant', icon: '☢️', label: 'PHÓNG XẠ' },
                    { id: 'dark', icon: 'TRỌNG', label: 'TRỌNG (HẮC ÁM)' },
                    { id: 'shield', icon: '🛡️', label: 'KHIÊN' }
                ];
                const type = types[Math.floor(Math.random() * types.length)];
                items.push({ x: canvas.width, y: GROUND_Y + 15, ...type });
            }
        }

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color
                });
            }
        }

        function update() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;
            score++;

            if (dino.mode === 'normal' && ragePercent < 100) {
                ragePercent += 0.166;
                rageFill.style.width = ragePercent + '%';
                if (ragePercent >= 100) rageFill.style.background = 'linear-gradient(90deg, #a855f7, #c084fc)';
            } else if (dino.mode !== 'normal') {
                rageFill.style.width = '0%';
            }

            if (frameCount % 800 === 0 && gameSpeed < 14) gameSpeed += 0.2;
            let displayScore = Math.floor(score/10);

            if (dino.timer > 0) {
                dino.timer--;
                let modeText = dino.mode === 'giant' ? "KHỔNG LỒ (🔥)" : (dino.mode === 'dark' ? "HẮC ÁM (TRỌNG)" : (dino.mode === 'gorilla' ? "GORILA SẤM SÉT" : "KHIÊN"));
                itemEl.innerText = `TRẠNG THÁI: ${modeText} - ${Math.ceil(dino.timer/60)}s`;
            } else {
                dino.mode = 'normal';
                dino.scale = 1;
                itemEl.innerText = `TRẠNG THÁI: THƯỜNG`;
            }

            // Physics
            dino.vy += GRAVITY;
            dino.y += dino.vy;
            let limitY = GROUND_Y + 44 - (dino.height * dino.scale);
            if (dino.y > limitY) {
                dino.y = limitY;
                dino.vy = 0;
                dino.isJumping = false;
            }

            // Ground Line
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, GROUND_Y + 44); ctx.lineTo(canvas.width, GROUND_Y + 44); ctx.stroke();

            // Items
            items.forEach((item, index) => {
                item.x -= gameSpeed;
                if (item.id === 'dark') {
                    ctx.save();
                    ctx.shadowBlur = 15; ctx.shadowColor = "#a855f7";
                    ctx.fillStyle = "black"; ctx.font = "bold 20px Arial";
                    ctx.fillText(item.icon, item.x, item.y + 20);
                    ctx.restore();
                } else {
                    ctx.font = '35px Arial'; ctx.fillText(item.icon, item.x, item.y + 20);
                }

                if (DINO_X < item.x + 50 && DINO_X + (dino.width*dino.scale) > item.x && dino.y + (dino.height*dino.scale) > item.y) {
                    dino.mode = item.id;
                    dino.timer = 600;
                    if (item.id === 'giant') dino.fireCount = 3;
                    items.splice(index, 1);
                    createParticles(item.x, item.y, item.id === 'dark' ? '#000' : '#fbbf24', 20);
                }
            });

            // Projectiles
            projectiles.forEach((p, index) => {
                p.x += p.vx;
                ctx.font = `${p.size}px Arial`; ctx.fillText("🔥", p.x, p.y + 20);
                obstacles.forEach((obs, obsIdx) => {
                    if (p.x > obs.x && p.x < obs.x + obs.w) {
                        createParticles(obs.x, GROUND_Y, '#f97316', 10);
                        obstacles.splice(obsIdx, 1);
                    }
                });
            });

            // Obstacles
            lastObstacleX -= gameSpeed;
            obstacles.forEach((obs, index) => {
                obs.x -= obs.vx;
                
                // Trọng mode fear logic
                if (dino.mode === 'dark' && obs.x - DINO_X < 250 && obs.x > DINO_X) {
                    obs.y -= 15; // Nhảy né
                    obs.isScared = true;
                } else {
                    obs.isScared = false;
                }

                if (obs.type === 'car') {
                    ctx.font = "40px Arial"; ctx.fillText("🚗", obs.x, GROUND_Y + 35);
                } else {
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(obs.x, obs.y + 44 - obs.h, obs.w, obs.h);
                    ctx.fillStyle = '#166534';
                    ctx.fillRect(obs.x + 10, obs.y + 50 - obs.h, 4, obs.h - 10);
                    if (obs.isScared) {
                        ctx.font = "15px Arial"; ctx.fillText("😭", obs.x, obs.y - 10);
                    }
                }

                let dw = dino.width * dino.scale, dh = dino.height * dino.scale;
                let isHit = DINO_X + 10 < obs.x + obs.w && DINO_X + dw - 10 > obs.x && dino.y + dh > obs.y + 44 - obs.h;
                
                if (isHit) {
                    if (dino.mode === 'giant' || dino.mode === 'gorilla') {
                        createParticles(obs.x, obs.y, dino.mode === 'gorilla' ? '#34d399' : '#ff0000', 15);
                        obstacles.splice(index, 1);
                    } else if (dino.mode !== 'dark' && dino.mode !== 'shield') {
                        endGame();
                    }
                }
            });

            // Draw Dino
            ctx.save();
            ctx.translate(DINO_X + (dino.width*dino.scale)/2, dino.y + (dino.height*dino.scale)/2);
            ctx.scale(-1 * dino.scale, 1 * dino.scale);
            
            if (dino.mode === 'dark') {
                ctx.shadowBlur = 30; ctx.shadowColor = "#a855f7";
                ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(0,0, 22, 0, Math.PI*2); ctx.fill();
            }

            if (dino.mode === 'gorilla') {
                ctx.strokeStyle = '#67e8f9'; ctx.lineWidth = 3;
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(Math.random()*60-30, Math.random()*60-30);
                    ctx.lineTo(Math.random()*60-30, Math.random()*60-30);
                    ctx.stroke();
                }
                ctx.font = '50px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("🦍", 0, 2);
            } else {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (dino.mode === 'dark') ctx.filter = 'brightness(0)';
                if (dino.mode === 'giant') ctx.filter = 'drop-shadow(0 0 10px red) hue-rotate(300deg)';
                ctx.fillText("🦖", 0, 2);
            }
            ctx.restore();

            // CHỮ "TRỌNG KÌA CHẠY ĐI" TRÊN ĐẦU DINO
            if (dino.mode === 'dark') {
                dino.fearAlpha = Math.min(1, dino.fearAlpha + 0.05);
                // Bay chậm chậm lên trên và lắc lư nhẹ
                dino.fearTextY = Math.sin(frameCount * 0.1) * 5 - 60;
                
                ctx.save();
                ctx.globalAlpha = dino.fearAlpha;
                ctx.fillStyle = "#ff4444";
                ctx.font = "bold 18px 'Press Start 2P', cursive";
                ctx.textAlign = "center";
                ctx.shadowBlur = 5; ctx.shadowColor = "white";
                // Lắc nhẹ theo trục X
                let shakeX = Math.sin(frameCount * 0.2) * 3;
                ctx.fillText("TRỌNG KÌA😭", DINO_X + (dino.width/2) + shakeX, dino.y + dino.fearTextY);
                ctx.restore();
            } else {
                dino.fearAlpha = Math.max(0, dino.fearAlpha - 0.1);
            }

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1;
                if (p.life <= 0) particles.splice(i, 1);
            });

            scoreEl.innerText = `ĐIỂM: ${String(displayScore).padStart(4, '0')}`;
            spawnObstacle(); spawnItem();
            requestAnimationFrame(update);
        }

        function endGame() {
            isGameOver = true;
            let final = Math.floor(score/10);
            if (final > highScore) {
                highScore = final;
                highScoreEl.innerText = `BEST: ${String(highScore).padStart(4, '0')}`;
            }
            document.getElementById('final-score').innerText = `ĐIỂM: ${final}`;
            modal.style.display = 'flex';
        }

        function resetGame() { init(); }
        init();
    </script>
</body>
</html>
